const TOTAL_TEMPLES = 917;
const LS_KEY = "temple_tracker_visited";

let visited = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
let currentDayIdx = 0;
let map, mapReady = false;
let swipeStartX = 0, swipeStartY = 0;

// ═══ Router ═══
function navigate(hash, replace) {
  if (replace) window.location.replace("#" + hash);
  else window.location.hash = hash;
}

function handleRoute() {
  const hash = window.location.hash.slice(1) || "";
  const parts = hash.split("/").filter(Boolean);
  const route = parts[0] || "day";

  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === route));
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));

  if (route === "day") {
    const dayNum = parseInt(parts[1]);
    const idx = dayNum ? ROUTE_DATA.days.findIndex(d => d.day === dayNum) : -1;
    if (idx >= 0) currentDayIdx = idx;
    showView("day");
    showDay(currentDayIdx);
  } else if (route === "stats") {
    showView("stats");
    renderStats();
  } else if (route === "settings") {
    showView("settings");
  } else {
    navigate("day", true);
  }
}

function showView(name, anim) {
  const el = document.getElementById("view-" + name);
  if (!el) return;
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  el.classList.add("active");
  if (anim) {
    el.style.animation = "none";
    el.offsetHeight;
    el.style.animation = anim + " .25s ease";
  }
}

// ═══ Init ═══
function init() {
  buildDaySelect();
  initMap();

  // Tabs
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => navigate(tab.dataset.view));
  });

  // Day nav
  document.getElementById("btn-prev").addEventListener("click", () => navDay(-1));
  document.getElementById("btn-next").addEventListener("click", () => navDay(1));
  document.getElementById("btn-today").addEventListener("click", () => {
    currentDayIdx = findTodayDay();
    navigate("day/" + ROUTE_DATA.days[currentDayIdx].day);
  });
  document.getElementById("day-select").addEventListener("change", (e) => {
    currentDayIdx = parseInt(e.target.value);
    navigate("day/" + ROUTE_DATA.days[currentDayIdx].day);
  });

  // Settings
  document.getElementById("btn-export").addEventListener("click", exportProgress);
  document.getElementById("btn-import-trigger").addEventListener("click", () => document.getElementById("import-file").click());
  document.getElementById("import-file").addEventListener("change", importProgress);
  document.getElementById("btn-reset").addEventListener("click", resetProgress);

  // Swipe
  const dayView = document.getElementById("view-day");
  dayView.addEventListener("touchstart", (e) => {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }, {passive: true});
  dayView.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - swipeStartX;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) navDay(1, "slideInRight");
      else navDay(-1, "slideInLeft");
    }
  }, {passive: true});

  // Router
  window.addEventListener("hashchange", handleRoute);
  if (!window.location.hash) {
    currentDayIdx = findTodayDay();
    navigate("day/" + ROUTE_DATA.days[currentDayIdx].day, true);
  } else {
    handleRoute();
  }

  // ── Telegram Mini App ──
  const isTG = !!window.Telegram?.WebApp?.initData;
  if (isTG) {
    const tg = Telegram.WebApp;
    const tp = tg.themeParams || {};
    const root = document.documentElement.style;
    const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
    tg.ready();

    // 2a. Fullscreen (mobile) + fallback expand
    if (isMobile && tg.requestFullscreen) {
      try { tg.requestFullscreen(); } catch(e) { tg.expand(); }
      tg.onEvent("fullscreenFailed", () => tg.expand());
    } else { tg.expand(); }

    // 2b. Safe Area Insets
    const applySafeArea = () => {
      const sa = tg.safeAreaInset || {};
      const csa = tg.contentSafeAreaInset || {};
      root.setProperty("--safe-top", (sa.top||0)+(csa.top||0)+"px");
      root.setProperty("--safe-bottom", (sa.bottom||0)+(csa.bottom||0)+"px");
    };
    applySafeArea();
    tg.onEvent("safeAreaChanged", applySafeArea);
    tg.onEvent("contentSafeAreaChanged", applySafeArea);

    // 2c. Header / Background / BottomBar colors
    const applyAppColors = () => {
      const p = tg.themeParams || {};
      tg.setHeaderColor(p.button_color || "#1a237e");
      tg.setBackgroundColor(p.bg_color || "#f5f5f5");
      if (tg.setBottomBarColor) tg.setBottomBarColor(p.bg_color || "#f5f5f5");
    };
    applyAppColors();

    // 2d. Closing Confirmation
    if (tg.enableClosingConfirmation) tg.enableClosingConfirmation();

    // 2e. SettingsButton → navigate("settings")
    if (tg.SettingsButton) {
      tg.SettingsButton.show();
      tg.SettingsButton.onClick(() => navigate("settings"));
    }

    // 2f. MainButton — "Отметить все ✓"
    const updateMainButton = () => {
      const hash = window.location.hash.slice(1) || "";
      const onDay = !hash || hash === "day" || hash.startsWith("day/");
      if (!onDay || !tg.MainButton) { if (tg.MainButton) tg.MainButton.hide(); return; }
      const day = ROUTE_DATA.days[currentDayIdx];
      if (!day) { tg.MainButton.hide(); return; }
      const unvisited = day.temples.filter(t => !visited[t.id]);
      if (unvisited.length === 0) { tg.MainButton.hide(); return; }
      const p = tg.themeParams || {};
      tg.MainButton.setParams({
        text: "Отметить все ✓",
        color: p.button_color || "#1a237e",
        text_color: p.button_text_color || "#ffffff",
        is_visible: true
      });
    };
    if (tg.MainButton) {
      tg.MainButton.onClick(() => {
        const day = ROUTE_DATA.days[currentDayIdx];
        if (!day) return;
        day.temples.forEach(t => { if (!visited[t.id]) toggleTemple(t.id, true); });
        tg.HapticFeedback.notificationOccurred("success");
        updateProgress();
        showDay(currentDayIdx);
        updateMainButton();
      });
    }
    window._updateMainButton = updateMainButton;
    window.addEventListener("hashchange", updateMainButton);

    // 2g. Theme Change Listener
    tg.onEvent("themeChanged", () => { applyAppColors(); updateMainButton(); });

    // 2h. BackButton + Haptic (kept)
    const updateBackButton = () => {
      const hash = window.location.hash.slice(1) || "";
      const isRoot = !hash || hash === "day" || hash.startsWith("day/");
      if (isRoot) tg.BackButton.hide();
      else tg.BackButton.show();
    };
    tg.BackButton.onClick(() => window.history.back());
    window.addEventListener("hashchange", updateBackButton);
    updateBackButton();
    window._tgHaptic = () => tg.HapticFeedback.impactOccurred("light");
  }

  updateProgress();
  registerSW();
}

function buildDaySelect() {
  const sel = document.getElementById("day-select");
  let lastWeek = 0;
  ROUTE_DATA.days.forEach((d, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    const prefix = d.week !== lastWeek ? `[Нед ${d.week}] ` : "";
    lastWeek = d.week;
    opt.textContent = `${prefix}День ${d.day} (${d.weekday}) — ${d.area}`;
    sel.appendChild(opt);
  });
}

function findTodayDay() {
  for (let i = 0; i < ROUTE_DATA.days.length; i++) {
    if (!ROUTE_DATA.days[i].temples.every(t => visited[t.id])) return i;
  }
  return 0;
}

// ═══ Map (Yandex Maps API 2.1) ═══
function initMap() {
  ymaps.ready(function() {
    map = new ymaps.Map("map", {
      center: [55.75, 37.62], zoom: 12,
      controls: ["zoomControl"]
    }, {
      zoomControlPosition: { right: 10, bottom: 40 }
    });
    mapReady = true;
    if (currentDayIdx >= 0) updateMap(ROUTE_DATA.days[currentDayIdx]);
  });
}

function updateMap(day) {
  if (!mapReady) return;
  map.geoObjects.removeAll();
  const points = [];
  const m = day.metro;

  // Metro marker
  const metroMark = new ymaps.Placemark([m.lat, m.lon], {
    iconContent: "M",
    balloonContent: `<b>м. ${m.name}</b>`
  }, {
    preset: "islands#blueCircleIcon"
  });
  map.geoObjects.add(metroMark);
  points.push([m.lat, m.lon]);

  // Temple markers
  day.temples.forEach((t, i) => {
    const isV = !!visited[t.id];
    const preset = isV ? "islands#darkGreenCircleIcon" : "islands#redCircleIcon";
    const navUrl = `https://yandex.ru/maps/?rtext=~${t.lat},${t.lon}&rtt=pd`;
    const mark = new ymaps.Placemark([t.lat, t.lon], {
      iconContent: String(i + 1),
      balloonContentHeader: t.name,
      balloonContentBody: `<a href="${navUrl}" target="_blank">&#x1F4CD; Навигация</a>`
    }, {
      preset: preset
    });
    map.geoObjects.add(mark);
    points.push([t.lat, t.lon]);
  });

  if (points.length > 1) {
    map.setBounds(ymaps.util.bounds.fromPoints(points), {
      checkZoomRange: true, zoomMargin: 40
    });
  } else if (points.length === 1) {
    map.setCenter(points[0], 15);
  }
}

// ═══ Day View ═══
function showDay(idx) {
  if (idx < 0 || idx >= ROUTE_DATA.days.length) return;
  currentDayIdx = idx;
  const day = ROUTE_DATA.days[idx];
  document.getElementById("day-select").value = idx;

  const walkKm = (day.total_walk_m / 1000).toFixed(1);
  const timeH = Math.floor(day.total_time_min / 60);
  const timeM = day.total_time_min % 60;
  const timeStr = timeH > 0 ? `${timeH} ч ${timeM} мин` : `${timeM} мин`;

  const dayDone = day.temples.filter(t => visited[t.id]).length;
  const dayTotal = day.temples.length;

  document.getElementById("day-info").innerHTML = `
    <div class="day-title">День ${day.day} (${day.weekday}) — ${day.area}</div>
    <div class="day-meta">
      ${day.district} &bull; м. ЦСКА &rarr; м. ${day.metro.name}
      &bull; ${dayDone}/${dayTotal} &#x2714;<br>
      ~${walkKm} км пешком &bull; ~${timeStr}${day.carsharing ? " &bull; &#x1F697; каршеринг" : ""}
    </div>`;

  const list = document.getElementById("temple-list");
  list.innerHTML = "";
  day.temples.forEach((t, i) => {
    const isV = !!visited[t.id];
    const distText = i === 0 ? `от метро ~${fmtDist(t.dist_from_prev)}` : fmtDist(t.dist_from_prev);
    const navUrl = `https://yandex.ru/maps/?rtext=~${t.lat},${t.lon}&rtt=pd`;
    const div = document.createElement("div");
    div.className = "temple-item";
    div.innerHTML = `
      <input type="checkbox" class="temple-cb" ${isV ? "checked" : ""}>
      <div class="temple-info">
        <div class="temple-name ${isV ? "visited" : ""}">${i+1}. ${t.name}</div>
        ${t.address ? `<div class="temple-addr">${t.address}</div>` : ""}
        <div class="temple-dist">${distText}</div>
      </div>
      <a class="temple-nav" href="${navUrl}" target="_blank">&#x1F4CD;</a>`;
    div.querySelector(".temple-cb").addEventListener("change", (e) => {
      toggleTemple(t.id, e.target.checked);
      if (window._tgHaptic) window._tgHaptic();
      div.querySelector(".temple-name").classList.toggle("visited", e.target.checked);
      updateMap(day);
      updateProgress();
      // Update day counter
      showDay(currentDayIdx);
    });
    list.appendChild(div);
  });

  document.getElementById("home-info").innerHTML =
    `<b>Домой:</b> ${day.home_route}<br><b>Дома ~${day.arrive_home}</b>`;

  setTimeout(() => { if (mapReady) { map.container.fitToViewport(); updateMap(day); } }, 100);
  if (window._updateMainButton) window._updateMainButton();
}

function navDay(delta, anim) {
  const next = currentDayIdx + delta;
  if (next >= 0 && next < ROUTE_DATA.days.length) {
    currentDayIdx = next;
    if (anim) {
      const el = document.getElementById("view-day");
      el.style.animation = "none";
      el.offsetHeight;
      el.style.animation = anim + " .25s ease";
    }
    navigate("day/" + ROUTE_DATA.days[currentDayIdx].day);
  }
}

function fmtDist(m) { return m >= 1000 ? (m/1000).toFixed(1)+" км" : m+" м"; }

// ═══ Stats View ═══
function renderStats() {
  const el = document.getElementById("stats-content");
  const totalVisited = Object.keys(visited).length;
  const pct = TOTAL_TEMPLES > 0 ? Math.round(totalVisited / TOTAL_TEMPLES * 100) : 0;

  // Per-district stats
  const districtStats = {};
  ROUTE_DATA.districts.forEach(d => { districtStats[d] = {total: 0, visited: 0}; });
  ROUTE_DATA.days.forEach(day => {
    day.temples.forEach(t => {
      if (districtStats[day.district]) {
        districtStats[day.district].total++;
        if (visited[t.id]) districtStats[day.district].visited++;
      }
    });
  });

  // Per-week stats
  const weekStats = {};
  ROUTE_DATA.days.forEach(day => {
    if (!weekStats[day.week]) weekStats[day.week] = {total: 0, visited: 0};
    day.temples.forEach(t => {
      weekStats[day.week].total++;
      if (visited[t.id]) weekStats[day.week].visited++;
    });
  });
  const maxWeek = Math.max(...Object.keys(weekStats).map(Number));
  const maxWeekTemples = Math.max(...Object.values(weekStats).map(w => w.total), 1);

  // Completed days
  let completedDays = 0;
  ROUTE_DATA.days.forEach(day => {
    if (day.temples.every(t => visited[t.id])) completedDays++;
  });

  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="stat-card">
        <h3>Храмов</h3>
        <div class="stat-big">${totalVisited}<span style="font-size:16px;color:#888">/${TOTAL_TEMPLES}</span></div>
        <div class="stat-sub">${pct}% выполнено</div>
      </div>
      <div class="stat-card">
        <h3>Дней</h3>
        <div class="stat-big">${completedDays}<span style="font-size:16px;color:#888">/${ROUTE_DATA.days.length}</span></div>
        <div class="stat-sub">завершено</div>
      </div>
    </div>

    <div class="stat-card">
      <h3>По округам</h3>
      <div class="district-list">`;

  ROUTE_DATA.districts.forEach(d => {
    const s = districtStats[d];
    const p = s.total > 0 ? Math.round(s.visited / s.total * 100) : 0;
    html += `
      <div class="district-row">
        <span class="district-name">${d}</span>
        <div class="district-bar-bg">
          <div class="district-bar-fill" style="width:${p}%"></div>
        </div>
        <span class="district-count">${s.visited}/${s.total}</span>
      </div>`;
  });

  html += `</div></div>
    <div class="stat-card">
      <h3>По неделям</h3>
      <div class="week-chart">`;

  for (let w = 1; w <= maxWeek; w++) {
    const ws = weekStats[w] || {total: 0, visited: 0};
    const hTotal = Math.round(ws.total / maxWeekTemples * 100);
    const hVisited = ws.total > 0 ? Math.round(ws.visited / ws.total * 100) : 0;
    const isActive = ws.visited > 0;
    html += `<div class="week-col${isActive ? " active" : ""}" style="height:${hTotal}%" title="Нед ${w}: ${ws.visited}/${ws.total}"></div>`;
  }

  html += `</div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span class="week-label">Нед 1</span>
        <span class="week-label">Нед ${maxWeek}</span>
      </div>
    </div>`;

  el.innerHTML = html;
}

// ═══ State ═══
function toggleTemple(id, checked) {
  if (checked) visited[id] = true;
  else delete visited[id];
  localStorage.setItem(LS_KEY, JSON.stringify(visited));
}

function updateProgress() {
  const count = Object.keys(visited).length;
  const pct = TOTAL_TEMPLES > 0 ? Math.round(count / TOTAL_TEMPLES * 100) : 0;
  document.getElementById("progress-text").textContent = `Посещено: ${count}/${TOTAL_TEMPLES} (${pct}%)`;
  document.getElementById("progress-fill").style.width = pct + "%";
}

// ═══ Export / Import / Reset ═══
function exportProgress() {
  const data = JSON.stringify({visited, exportedAt: new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "temple_progress.json";
  a.click();
}

function importProgress(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.visited) {
        visited = data.visited;
        localStorage.setItem(LS_KEY, JSON.stringify(visited));
        updateProgress();
        handleRoute();
        alert("Прогресс восстановлен!");
      }
    } catch(err) { alert("Ошибка: " + err.message); }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function resetProgress() {
  if (!confirm("Удалить весь прогресс? Это действие необратимо.")) return;
  visited = {};
  localStorage.removeItem(LS_KEY);
  updateProgress();
  handleRoute();
}

// ═══ PWA Service Worker ═══
function registerSW() {
  if (!("serviceWorker" in navigator)) return;
  const swCode = `
    const CACHE = "temples-v1";
    const URLS = [self.location.href.replace(/sw\.js.*/, "")];
    self.addEventListener("install", e => e.waitUntil(
      caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting())
    ));
    self.addEventListener("activate", e => e.waitUntil(self.clients.claim()));
    self.addEventListener("fetch", e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
        if (resp.ok) {
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => caches.match(e.request))));
    });
  `;
  const blob = new Blob([swCode], {type: "application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

init();
</script>
